name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Build
        run: cargo build --verbose
      - name: Verify generated OpenAPI artifact
        run: cargo test -p sccgub-api openapi::tests::test_generated_openapi_matches_checked_in_artifact -- --exact
      - name: Run tests
        run: cargo test --verbose
      - name: Verify repo truth
        shell: pwsh
        run: ./scripts/verify-repo-truth.ps1
      - name: Clippy
        run: cargo clippy -- -D warnings

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Security audit
        run: cargo audit

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (Windows)
        env:
          CARGO_TARGET_DIR: target-windows-${{ github.run_id }}-build
        run: cargo build
      - name: Test (Windows)
        env:
          CARGO_TARGET_DIR: target-windows-${{ github.run_id }}-test
        run: cargo test
